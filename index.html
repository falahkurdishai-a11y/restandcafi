<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght=300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
        .bg-custom-blue { background-color: #CCFFFF; }
        .text-custom-blue { color: #006666; }
        .border-custom-blue { border-color: #CCFFFF; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-300 overflow-x-hidden">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 id="site-title" class="text-2xl font-bold text-gray-900">Tech AI Menu</h1>
            
            <div class="flex items-center space-x-2 space-x-reverse">
                <button onclick="toggleCartModal()" class="relative flex items-center justify-center bg-gray-100 hover:bg-gray-200 p-2.5 rounded-full transition duration-200 shadow-sm text-gray-700 transform hover:scale-110" title="Shopping Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-gray-800">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                    </svg>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
                </button>

                <button onclick="toggleLanguage()" class="flex items-center justify-center bg-gray-100 hover:bg-gray-200 p-2.5 rounded-full transition duration-200 shadow-sm text-gray-700 transform hover:scale-110" title="Change Language">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-gray-700">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-.778.099-1.533.284-2.253m0 0A17.919 17.919 0 0 0 12 10.5c2.998 0 5.74 1.1 7.843 2.918" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div id="cart-modal" class="fixed inset-0 z-50 hidden">
        <div onclick="toggleCartModal()" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div class="absolute top-0 bottom-0 left-0 right-0 md:left-auto md:right-0 w-full md:w-96 bg-white shadow-2xl flex flex-col p-6 transition-transform duration-300">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <h2 id="modal-cart-title" class="text-xl font-bold text-gray-900">سەلکا کڕینێ</h2>
                <button onclick="toggleCartModal()" class="text-gray-500 hover:text-gray-800 p-1 bg-gray-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div id="cart-items-container" class="flex-grow overflow-y-auto space-y-4 pr-1"></div>

            <div class="border-t pt-4 mt-4">
                <div class="flex justify-between items-center mb-4">
                    <span id="modal-total-text" class="font-bold text-gray-700">کۆما گشتی:</span>
                    <span id="cart-total-price" class="text-xl font-bold text-gray-900">0 د.ع</span>
                </div>
                <button id="modal-checkout-btn" onclick="openCheckoutModal()" class="w-full py-3 rounded-xl bg-gray-950 hover:bg-gray-800 text-white font-bold transition">پەسندکرنا کڕینێ</button>
            </div>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div onclick="closeCheckoutModal()" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 relative z-10 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 id="checkout-title" class="text-lg font-bold text-gray-900">تەمامکرنا داواکاریێ</h3>
                <button onclick="closeCheckoutModal()" class="text-gray-500 hover:text-gray-800 p-1 bg-gray-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <form id="order-form" onsubmit="submitOrder(event)" class="space-y-4">
                <div>
                    <label id="lbl-name" class="block text-sm font-bold text-gray-700 mb-1">ناڤێ تە:</label>
                    <input type="text" id="cust-name" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500 outline-none text-sm transition" placeholder="بۆ نموونە: فلاح">
                </div>
                <div>
                    <label id="lbl-address" class="block text-sm font-bold text-gray-700 mb-1">ناڤ و نیشان (ناڤونیشانێ تە):</label>
                    <input type="text" id="cust-address" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500 outline-none text-sm transition" placeholder="بۆ نموونە: زاخۆ - نێزیک پرێ">
                </div>
                <div>
                    <label id="lbl-notes" class="block text-sm font-bold text-gray-700 mb-1">تێبینیێن تایبەت ل سەر خارنێ (ئەگەر هەبن):</label>
                    <textarea id="cust-notes" rows="3" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500 outline-none text-sm transition resize-none" placeholder="بۆ نموونە: بێرگەر بێ پەنیر بیت، یان سۆس کێم بیت..."></textarea>
                </div>
                
                <button type="submit" id="btn-submit-order" class="w-full py-3 rounded-xl bg-cyan-600 hover:bg-cyan-700 text-white font-bold transition shadow-md mt-2">ڕەوانەکرنا داواکاریێ</button>
            </form>
        </div>
    </div>

    <section class="max-w-6xl mx-auto px-4 mt-6">
        <div class="relative w-full h-56 sm:h-80 rounded-2xl overflow-hidden shadow-md group">
            
            <div id="slider-container" class="w-full h-full flex transition-transform duration-500 ease-in-out">
                <div class="w-full h-full flex-shrink-0 bg-cover bg-center" style="background-image: url('https://i.postimg.cc/XYDQzgSH/photo-2026-05-23-18-37-47.jpg');"></div>
                <div class="w-full h-full flex-shrink-0 bg-cover bg-center" style="background-image: url('https://i.postimg.cc/yN1sLsKS/photo-2026-05-23-18-45-35.jpg');"></div>
                <div class="w-full h-full flex-shrink-0 bg-cover bg-center" style="background-image: url('https://i.postimg.cc/gJrdPsn0/photo-2026-05-23-18-45-24.jpg');"></div>
            </div>

            <div class="absolute inset-0 bg-black/5 pointer-events-none"></div>

            <button onclick="nextSlide()" class="absolute top-1/2 right-3 -translate-y-1/2 bg-white/40 hover:bg-white/75 text-gray-900 p-2 rounded-full shadow-sm transition backdrop-blur-[2px] z-10 focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 sm:w-5 sm:h-5 text-gray-800">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5l6 6m0 0l-6 6m6-6H3" />
                </svg>
            </button>

            <button onclick="prevSlide()" class="absolute top-1/2 left-3 -translate-y-1/2 bg-white/40 hover:bg-white/75 text-gray-900 p-2 rounded-full shadow-sm transition backdrop-blur-[2px] z-10 focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 sm:w-5 sm:h-5 text-gray-800">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5l-6-6m0 0l6-6m-6 6h18" />
                </svg>
            </button>

            <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex space-x-2 space-x-reverse z-10">
                <button onclick="goToSlide(0)" class="slider-dot w-2 h-2 rounded-full bg-white transition-all duration-300"></button>
                <button onclick="goToSlide(1)" class="slider-dot w-2 h-2 rounded-full bg-white/40 transition-all duration-300"></button>
                <button onclick="goToSlide(2)" class="slider-dot w-2 h-2 rounded-full bg-white/40 transition-all duration-300"></button>
            </div>
        </div>

        <div class="hidden">
            <span id="hero-title"></span>
            <span id="hero-subtitle"></span>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div id="main-category-container" class="flex flex-wrap justify-center gap-3 mb-8">
            <button id="btn-main-all" onclick="filterMain('all')" class="main-cat-btn px-6 py-3 rounded-full font-bold bg-custom-blue text-gray-900 shadow-md transition-all transform hover:scale-105">هەمی</button>
        </div>

        <div id="sub-category-container" class="flex flex-wrap justify-center gap-2 mb-8 hidden"></div>

        <div id="loader" class="text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-gray-700 mx-auto"></div>
            <p id="loader-text" class="mt-4 text-gray-500">تێبینیا داتایان دکەین...</p>
        </div>

        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>
    </main>

    <footer class="bg-gray-950 text-gray-400 text-center py-6 mt-12 border-t border-gray-800 text-sm">
        <p>&copy; 2026 Tech AI Menu. All Rights Reserved.</p>
    </footer>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR3aCMF_rJ_j8_1SqUIn4WyCDvjCMmfakANhuDVnck-DxMyKq8cpj9HF8-Q7JXPbJbCKDFJB8oie-r5/pub?output=csv';
        
        let allItems = [];
        let cart = []; 
        let currentLang = 'ku'; 
        let activeMainFilter = 'all';
        let activeSubFilter = 'all';

        // سکریپتێ کۆنترۆڵکرنا سڵایدەرێ (بێ setInterval داکو ئۆتۆماتیک نەگۆڕیت)
        let currentSlide = 0;
        const totalSlides = 3;

        function updateSlider() {
            const container = document.getElementById('slider-container');
            const isLtr = document.documentElement.dir === 'ltr';
            
            const movePercentage = currentSlide * 100;
            container.style.transform = `translateX(${isLtr ? -movePercentage : movePercentage}%)`;

            // نووکرنا ڕەنگێ خالێن خوارێ
            const dots = document.querySelectorAll('.slider-dot');
            dots.forEach((dot, idx) => {
                if(idx === currentSlide) {
                    dot.classList.remove('bg-white/40');
                    dot.classList.add('bg-white', 'w-4');
                } else {
                    dot.classList.remove('bg-white', 'w-4');
                    dot.classList.add('bg-white/40');
                }
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            updateSlider();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            updateSlider();
        }

        function goToSlide(slideIndex) {
            currentSlide = slideIndex;
            updateSlider();
        }


        const translations = {
            ku: {
                title: "مینیویا مە", heroT: "", heroS: "",
                all: "هەمی", priceUnit: "د.ع",
                cartTitle: "سەلکا کڕینێ", totalText: "کۆما گشتی:", checkoutBtn: "پەسندکرنا کڕینێ", emptyCart: "سەلک ڤالایە!",
                loaderText: "تێبینیا داتایان دکەین...", errorText: "کێشەیەک د خواندنا داتایاندا هەیە!", noItems: "چ پشک یان ئایتم نەهاتینە دۆزینەوە.",
                checkoutTitle: "تەمامکرنا داواکاریێ", lblName: "ناڤێ تە:", lblAddress: "ناڤ و نیشان:", lblNotes: "تێبینیێن تایبەت ل سەر خارنێ (بۆ نموونە: بێرگەر بێ پەنیر):",
                btnSubmit: "ڕەوانەکرنا داواکاریێ", alertSelect: "هیڤیە بەرهەما زێدەکە بەری پەسندکرنێ!", placeholderName: "بۆ نموونە: فلاح", placeholderAddress: "بۆ نموونە: زاخۆ - نێزیک پرێ", placeholderNotes: "بۆ نموونە: بێرگەر بێ پەنیر بیت..."
            },
            ar: {
                title: "القائمة الخاصة بنا", heroT: "", heroS: "",
                all: "الكل", priceUnit: "د.ع",
                cartTitle: "سلة التسوق", totalText: "الإجمالي:", checkoutBtn: "تأكيد الطلب", emptyCart: "السلة فارغة!",
                loaderText: "جاري تحميل البيانات...", errorText: "هناك مشكلة في قراءة البيانات!", noItems: "لم يتم العثور على أي أقسام أو عناصر.",
                checkoutTitle: "إتمام الطلب", lblName: "الاسم:", lblAddress: "العنوان:", lblNotes: "ملاحظات خاصة بالطعام (مثال: برغر بدون جبن):",
                btnSubmit: "إرسال الطلب", alertSelect: "يرجى إضافة عناصر للسلة أولاً!", placeholderName: "مثال: فلاح", placeholderAddress: "مثال: زاخو - قرب الجسر", placeholderNotes: "مثال: برغر بدون جبن..."
            },
            en: {
                title: "Our Menu", heroT: "", heroS: "",
                all: "All", priceUnit: "IQD",
                cartTitle: "Shopping Cart", totalText: "Total Price:", checkoutBtn: "Checkout", emptyCart: "Cart is empty!",
                loaderText: "Loading data...", errorText: "There is a problem reading the data!", noItems: "No sections or items found.",
                checkoutTitle: "Complete Order", lblName: "Your Name:", lblAddress: "Address:", lblNotes: "Special Food Notes (e.g., Burger without cheese):",
                btnSubmit: "Submit Order", alertSelect: "Please add items to the cart first!", placeholderName: "e.g., Falah", placeholderAddress: "e.g., Zakho - Near Bridge", placeholderNotes: "e.g., Burger without cheese..."
            }
        };

        async function fetchMenuData() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                allItems = rows.map((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    if(cols.length >= 11) {
                        return {
                            id: index, 
                            Main_KU: cols[0]?.trim(), Main_AR: cols[1]?.trim(), Main_EN: cols[2]?.trim(),
                            Sub_KU: cols[3]?.trim(),  Sub_AR: cols[4]?.trim(),  Sub_EN: cols[5]?.trim(),
                            Item_KU: cols[6]?.trim(), Item_AR: cols[7]?.trim(), Item_EN: cols[8]?.trim(),
                            Price: parseFloat(cols[9]?.trim()) || 0,
                            Image: cols[10]?.trim()?.replace(/\r$/, '')
                        };
                    }
                    return null;
                }).filter(item => item !== null && item.Item_KU !== "");

                document.getElementById('loader').classList.add('hidden');
                buildMainCategoriesUI();
                renderUI();
                updateSlider();
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loader').innerHTML = `<p class='text-red-500'>${translations[currentLang].errorText}</p>`;
            }
        }

        function buildMainCategoriesUI() {
            const container = document.getElementById('main-category-container');
            container.innerHTML = '';

            const allBtn = document.createElement('button');
            allBtn.id = "btn-main-all";
            allBtn.className = "main-cat-btn px-6 py-3 rounded-full font-bold shadow-md transition-all transform hover:scale-105";
            allBtn.style.backgroundColor = activeMainFilter === 'all' ? '#CCFFFF' : '#FFFFFF';
            allBtn.style.color = '#111827';
            if(activeMainFilter !== 'all') allBtn.className += " border border-gray-200 text-gray-700";
            allBtn.innerText = translations[currentLang].all;
            allBtn.onclick = () => filterMain('all');
            container.appendChild(allBtn);

            const uniqueMains = [];
            allItems.forEach(item => {
                const ku = item.Main_KU;
                const ar = item.Main_AR;
                const en = item.Main_EN;
                if(ku && !uniqueMains.some(m => m.ku === ku)) {
                    uniqueMains.push({ ku, ar, en });
                }
            });

            uniqueMains.forEach(main => {
                const btn = document.createElement('button');
                btn.className = "main-cat-btn px-6 py-3 rounded-full font-bold transition-all transform hover:scale-105 shadow";
                
                const currentMainName = currentLang === 'ku' ? main.ku : (currentLang === 'ar' ? main.ar : main.en);
                btn.innerText = currentMainName;

                if (activeMainFilter === main.ku) {
                    btn.style.backgroundColor = '#CCFFFF';
                    btn.style.color = '#111827';
                    btn.className += " shadow-md";
                } else {
                    btn.className += " bg-white text-gray-700 border border-gray-200";
                }

                btn.onclick = () => filterMain(main.ku);
                container.appendChild(btn);
            });
        }

        function addToCart(itemId) {
            const product = allItems.find(item => item.id === itemId);
            if (!product) return;

            const existingItem = cart.find(item => item.id === itemId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        function changeQuantity(itemId, amount) {
            const item = cart.find(item => item.id === itemId);
            if (!item) return;

            item.quantity += amount;
            if (item.quantity <= 0) {
                removeFromCart(itemId);
            } else {
                updateCartUI();
            }
        }

        function removeFromCart(itemId) {
            cart = cart.filter(item => item.id !== itemId);
            updateCartUI();
        }

        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-badge').innerText = totalItems;

            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-8">${translations[currentLang].emptyCart}</p>`;
                document.getElementById('cart-total-price').innerText = `0 ${translations[currentLang].priceUnit}`;
                return;
            }

            let totalPrice = 0;

            cart.forEach(item => {
                const name = item[`Item_${currentLang.toUpperCase()}`] || item.Item_KU;
                const itemTotal = item.Price * item.quantity;
                totalPrice += itemTotal;

                const row = document.createElement('div');
                row.className = "flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100";
                row.innerHTML = `
                    <div class="flex items-center space-x-3 space-x-reverse flex-grow">
                        <img src="${item.Image && item.Image.startsWith('http') ? item.Image : 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100'}" class="w-12 h-12 object-cover rounded-lg">
                        <div class="flex flex-col min-w-0 flex-grow">
                            <span class="font-bold text-sm text-gray-900 truncate">${name}</span>
                            <span class="text-xs text-gray-500">${item.Price.toLocaleString()} ${translations[currentLang].priceUnit}</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center bg-white border border-gray-200 rounded-lg p-0.5 mx-2">
                        <button onclick="changeQuantity(${item.id}, -1)" class="w-6 h-6 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-600 transition font-bold text-base">-</button>
                        <span class="px-2 text-sm font-bold text-gray-900 min-w-[20px] text-center">${item.quantity}</span>
                        <button onclick="changeQuantity(${item.id}, 1)" class="w-6 h-6 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-600 transition font-bold text-base">+</button>
                    </div>

                    <button onclick="removeFromCart(${item.id})" class="text-red-500 hover:text-red-700 p-1 bg-red-50 rounded-full transition">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                        </svg>
                    </button>
                `;
                container.appendChild(row);
            });

            document.getElementById('cart-total-price').innerText = `${totalPrice.toLocaleString()} ${translations[currentLang].priceUnit}`;
        }

        function openCheckoutModal() {
            if (cart.length === 0) {
                alert(translations[currentLang].alertSelect);
                return;
            }
            toggleCartModal();
            document.getElementById('checkout-modal').classList.remove('hidden');
        }

        function closeCheckoutModal() {
            document.getElementById('checkout-modal').classList.add('hidden');
        }

        function submitOrder(event) {
            event.preventDefault();
            
            const name = document.getElementById('cust-name').value;
            const address = document.getElementById('cust-address').value;
            const notes = document.getElementById('cust-notes').value;

            const orderDetails = {
                customer: { name, address, notes },
                items: cart.map(i => ({ name: i.Item_KU, qty: i.quantity, price: i.Price })),
                total: cart.reduce((sum, i) => sum + (i.Price * i.quantity), 0)
            };

            console.log("Order Submitted: ", orderDetails);
            
            alert(currentLang === 'ku' ? `سۆپاس ${name}، داواکاریا تە هاتە تۆمارکرن!` : `شكراً ${name}، تم تسجيل طلبك بنجاح!`);
            
            cart = [];
            updateCartUI();
            document.getElementById('order-form').reset();
            closeCheckoutModal();
        }

        function toggleCartModal() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
        }

        function toggleLanguage() {
            if (currentLang === 'ku') applyLanguage('ar');
            else if (currentLang === 'ar') applyLanguage('en');
            else applyLanguage('ku');
        }

        function applyLanguage(lang) {
            currentLang = lang;
            
            if(lang === 'en') {
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
            } else {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = lang;
            }

            document.getElementById('site-title').innerText = translations[lang].title;
            document.getElementById('hero-title').innerText = translations[lang].heroT;
            document.getElementById('hero-subtitle').innerText = translations[lang].heroS;

            document.getElementById('modal-cart-title').innerText = translations[lang].cartTitle;
            document.getElementById('modal-total-text').innerText = translations[lang].totalText;
            document.getElementById('modal-checkout-btn').innerText = translations[lang].checkoutBtn;
            
            document.getElementById('checkout-title').innerText = translations[lang].checkoutTitle;
            document.getElementById('lbl-name').innerText = translations[lang].lblName;
            document.getElementById('lbl-address').innerText = translations[lang].lblAddress;
            document.getElementById('lbl-notes').innerText = translations[lang].lblNotes;
            document.getElementById('btn-submit-order').innerText = translations[lang].btnSubmit;
            
            document.getElementById('cust-name').placeholder = translations[lang].placeholderName;
            document.getElementById('cust-address').placeholder = translations[lang].placeholderAddress;
            document.getElementById('cust-notes').placeholder = translations[lang].placeholderNotes;

            const loaderText = document.getElementById('loader-text');
            if(loaderText) loaderText.innerText = translations[lang].loaderText;

            buildMainCategoriesUI();
            updateCartUI();
            renderUI();
            updateSlider();
        }

        function filterMain(mainKuValue) {
            activeMainFilter = mainKuValue;
            activeSubFilter = 'all';
            buildMainCategoriesUI();
            renderUI();
        }

        function filterSub(subKuValue) {
            activeSubFilter = subKuValue;
            document.querySelectorAll('.sub-cat-btn').forEach(btn => {
                btn.removeAttribute('style');
                btn.classList.add('bg-gray-100', 'text-gray-700');
            });
            event.target.classList.remove('bg-gray-100', 'text-gray-700');
            event.target.style.backgroundColor = '#CCFFFF';
            event.target.style.color = '#111827';
            renderProducts();
        }

        function renderUI() {
            renderSubCategories();
            renderProducts();
        }

        function renderSubCategories() {
            const container = document.getElementById('sub-category-container');
            container.innerHTML = '';

            if (activeMainFilter === 'all') {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            const filteredItems = allItems.filter(item => item.Main_KU === activeMainFilter);
            
            const uniqueSubs = [];
            filteredItems.forEach(item => {
                const ku = item.Sub_KU;
                const ar = item.Sub_AR;
                const en = item.Sub_EN;
                if(ku && !uniqueSubs.some(s => s.ku === ku)) {
                    uniqueSubs.push({ ku, ar, en });
                }
            });

            const allBtn = document.createElement('button');
            allBtn.className = `sub-cat-btn px-4 py-1.5 rounded-full text-sm font-medium transition`;
            if (activeSubFilter === 'all') {
                allBtn.style.backgroundColor = '#CCFFFF';
                allBtn.style.color = '#111827';
            } else {
                allBtn.className += ' bg-gray-100 text-gray-700 hover:bg-gray-200';
            }
            allBtn.innerText = translations[currentLang].all;
            allBtn.onclick = () => filterSub('all');
            container.appendChild(allBtn);

            uniqueSubs.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = `sub-cat-btn px-4 py-1.5 rounded-full text-sm font-medium transition`;
                
                const currentSubName = currentLang === 'ku' ? sub.ku : (currentLang === 'ar' ? sub.ar : sub.en);
                btn.innerText = currentSubName;

                if (activeSubFilter === sub.ku) {
                    btn.style.backgroundColor = '#CCFFFF';
                    btn.style.color = '#111827';
                } else {
                    btn.className += ' bg-gray-100 text-gray-700 hover:bg-gray-200';
                }
                btn.onclick = () => filterSub(sub.ku);
                container.appendChild(btn);
            });
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            let filtered = allItems;
            
            if (activeMainFilter !== 'all') {
                filtered = filtered.filter(item => item.Main_KU === activeMainFilter);
            }

            if (activeSubFilter !== 'all') {
                filtered = filtered.filter(item => item.Sub_KU === activeSubFilter);
            }

            if(filtered.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-gray-400 py-8 text-lg">${translations[currentLang].noItems}</p>`;
                return;
            }

            filtered.forEach(item => {
                const name = item[`Item_${currentLang.toUpperCase()}`] || item.Item_KU;
                const subName = item[`Sub_${currentLang.toUpperCase()}`] || item.Sub_KU;
                const img = item.Image && item.Image.startsWith('http') ? item.Image : 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&auto=format&fit=crop&q=60';

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition duration-300 flex flex-col";
                card.innerHTML = `
                    <div class="relative h-36 sm:h-48 w-full bg-gray-100">
                        <img src="${img}" alt="${name}" class="w-full h-full object-cover">
                        <span class="absolute top-2 right-2 bg-white/90 backdrop-blur-sm text-[10px] sm:text-xs text-gray-800 font-bold px-2 py-0.5 rounded-full shadow-sm">
                            ${subName}
                        </span>
                    </div>
                    <div class="p-3 flex flex-col flex-grow justify-between">
                        <h3 class="font-bold text-sm sm:text-lg text-gray-900 mb-1 line-clamp-2">${name}</h3>
                        <div class="flex justify-between items-center mt-auto">
                            <span class="text-gray-900 font-bold text-sm sm:text-lg">
                                ${item.Price.toLocaleString()} <span class="text-[10px] sm:text-xs font-normal text-gray-500">${translations[currentLang].priceUnit}</span>
                            </span>
                            <button onclick="addToCart(${item.id})" class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-800 transition active:scale-95 shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 sm:w-5 sm:h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = fetchMenuData;
    </script>
</body>
</html>
